version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-cesnet
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: cesnet-anomaly-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    restart: unless-stopped